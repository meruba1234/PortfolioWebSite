
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>ポートフォリオWEBサイト SkillShowcase</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="main-content">
            <header>
                <h1>SkillShowcase</h1>
                <nav>
                    <ul>
                        <li><a href="portfolio.html">ホーム</a></li>
                        <li><a href="itskills.html">ITスキル</a></li>
                        <li><a href="android-app.html">アプリ紹介</a></li> 
                        <li><a href="contact.html">お問い合わせ</a></li> 
                    </ul>
                </nav>
            </header>

            <section id="contact">
                <h2>お問い合わせ</h2>
                <p>お問い合わせをご希望の方は、以下のボタンをご利用ください。</p>
                <a id="contact-email-link" href="#">メールでお問い合わせ</a>
                <noscript>
                    <p>メール送信先: meruba1234 [at] gmail.com</p>
                </noscript>
            </section>

            <footer>
                <p>© 2024 SkillShowcase. All rights reserved.</p>
            </footer>

            <!-- ページの先頭に戻るボタン -->
            <a href="#" class="to-top">↑ Top</a>
        </div>
    </div>
    <script>
        // スクロールに応じてボタンを表示または非表示にする関数
        function toggleToTopButton() {
            var toTopButton = document.querySelector('.to-top');
            
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                toTopButton.style.display = "block";
            } else {
                toTopButton.style.display = "none";
            }
        }
        
        // スクロールイベントに関数をバインド
        window.onscroll = function() { toggleToTopButton(); };
        
        // ボタンクリックでページの先頭にスムーススクロールする
        document.querySelector('.to-top').addEventListener('click', function(e) {
            e.preventDefault();
            window.scrollTo({top: 0, behavior: 'smooth'});
        });

        // メールアドレスをページ描画後に組み立てる
        (function setupContactLink() {
            var user = 'meruba1234';
            var domain = 'gmail.com';
            var subject = encodeURIComponent('meruba1234へのお問い合わせ');
            var body = encodeURIComponent('お名前：\nメールアドレス：\nお問い合わせ内容：');
            var email = user + '@' + domain;
            var link = document.getElementById('contact-email-link');

            link.href = 'mailto:' + email + '?subject=' + subject + '&body=' + body;
        })();
    </script>     
</body>
</html>
